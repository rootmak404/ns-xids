
rules:
  - id: R_BF_01
    class: Brute_Force
    description: "Short authentication-like exchange: a handful of PSH/ACK-flagged packets"
    condition: "features['PSH Flag Count'] >= 1 and features['ACK Flag Count'] >= 1 and 3 <= features['Total Fwd Packets'] <= 20"
    weight: 0.3
    evidence_text: "a short handshake-like exchange with {Total Fwd Packets:.0f} forward packets and active PSH/ACK flags"

  - id: R_BF_02
    class: Brute_Force
    description: "Quick connection reject/response pattern, typical of failed login attempts"
    condition: "1000 <= features['Flow Duration'] <= 2000000"
    weight: 0.15
    evidence_text: "a flow duration ({Flow Duration:.0f} microsec) consistent with a quick authentication reject"

  - id: R_BF_03
    class: Brute_Force
    description: "Connection targets a common authentication service port"
    condition: "features['Destination Port'] in (21, 22, 23, 25, 3389, 3306, 5432, 445)"
    weight: 0.2
    evidence_text: "the destination port ({Destination Port:.0f}) is a common authentication/service port"

  - id: R_BF_04
    class: Brute_Force
    description: "Repeated connection attempts from same source to same destination in monitoring window (requires monitoring-layer aggregation)"
    condition: "context is not None and context.get('recent_attempts_from_src', 0) > 10"
    weight: 0.4
    evidence_text: "{recent_attempts_from_src} repeated connection attempts from the same source within the monitoring window"
